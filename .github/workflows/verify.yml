name: Verify

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  self-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run workflow self-test
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\test-workflow.ps1

      - name: Check whitespace errors
        shell: powershell
        run: git diff --check
