workflow:
  version: "0.3.0"
  profile: standard
  archetype: wordpress-bedrock
  automatic_activation: true
workflow_authority:
  startup: project-workflow
  planning: spec-kit
  implementation: after-speckit-analyze
  verification: project-workflow
  optional_executor_skills_may_replace_planning: false
branching:
  strategy: github-flow
  production_branch: main
spec_kit:
  enabled: true
  mode: ask-to-initialize
  use_for_non_trivial_work: true
  enforce_for_non_trivial_work: true
  require_before_implementation: true
  enforced_order:
    - "/speckit.constitution"
    - "/speckit.specify"
    - "/speckit.clarify"
    - "/speckit.plan"
    - "/speckit.checklist"
    - "/speckit.tasks"
    - "/speckit.analyze"
    - "/speckit.implement"
    - "/speckit.converge"
  codex_skills_mode_order:
    - "$speckit-constitution"
    - "$speckit-specify"
    - "$speckit-clarify"
    - "$speckit-plan"
    - "$speckit-checklist"
    - "$speckit-tasks"
    - "$speckit-analyze"
    - "$speckit-implement"
    - "$speckit-converge"
  converge: when-available-and-needed
skills:
  install_mode: ask
safety:
  dry_run_default: true
  managed_blocks: true
  preserve_user_files: true
