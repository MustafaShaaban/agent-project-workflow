---
# AI Workflow Configuration
# Copy this file to your project root as .ai-workflow.yml
# Adjust values for your project. All fields have safe defaults.

project:
  name: '[project-name]'
  # auto | wordpress | php | laravel | js | ts | react | vue | svelte | python | dotnet | unknown
  type: auto

platform:
  # auto | github | azure-devops | generic-git
  provider: auto

workflow:
  # minimal    - safe root detection, no heavy process, no required docs
  # standard   - branch safety, progress tracking, verification, PR-friendly (default)
  # strict     - mandatory Git Flow, guard scripts, required checks, strong handoff rules
  # enterprise - strict + governance, reviewers, branch policies, auditability
  profile: standard

  # normal           - normal session start
  # observe-only     - audit only, no file modifications
  # safe-bootstrap   - add missing workflow files, skip existing
  # strict-migration - propose Git Flow conversion, requires explicit owner approval
  mode: normal

# Authority is explicit so agents do not substitute another workflow skill.
workflow_authority:
  startup: project-workflow
  planning: spec-kit
  implementation: after-speckit-analyze
  verification: project-workflow
  optional_executor_skills_may_replace_planning: false

spec_kit:
  # ask-to-initialize | enabled | disabled
  mode: ask-to-initialize
  enforce_for_non_trivial_work: true
  require_before_implementation: true
  enforced_order:
    - '/speckit.constitution'
    - '/speckit.specify'
    - '/speckit.clarify'
    - '/speckit.plan'
    - '/speckit.checklist'
    - '/speckit.tasks'
    - '/speckit.analyze'
    - '/speckit.implement'
    - '/speckit.converge'
  codex_skills_mode_order:
    - '$speckit-constitution'
    - '$speckit-specify'
    - '$speckit-clarify'
    - '$speckit-plan'
    - '$speckit-checklist'
    - '$speckit-tasks'
    - '$speckit-analyze'
    - '$speckit-implement'
    - '$speckit-converge'
  converge: when-available-and-needed

branching:
  # git-flow     - feature/fix/chore from develop; release/hotfix with merge-back
  # github-flow  - feature branches from main (default)
  # trunk-based  - short-lived branches or direct commits to trunk
  # custom       - agent reads AGENTS.md/CLAUDE.md for branching rules
  strategy: github-flow

  # main | master | trunk
  production_branch: main

  # Used only when strategy is git-flow
  integration_branch: develop

  allowed_work_branch_patterns:
    - 'feature/*'
    - 'fix/*'
    - 'chore/*'
    - 'hotfix/*'
    - 'release/*'

agent_safety:
  require_real_root: true
  stop_on_unexpected_worktree: true
  never_implement_on_production: true
  # Set never_implement_on_integration to false to allow small docs/chore changes on develop
  never_implement_on_integration: true

  # If true, stop and report when the worktree is dirty before editing
  require_clean_worktree: false

documentation:
  required:
    - PROGRESS.md
    - DECISIONS.md
  optional:
    - AGENTS.md
    - CLAUDE.md
    - PROJECT-WORKING-GUIDE.md
    - specs/constitution.md

verification:
  require_verification_before_handoff: true
  require_test_commands_documented: false

handoff:
  required: true
  # full  - full structured handoff with all sections
  # brief - short summary only
  format: full

skills:
  # ask                - detect missing skills and ask before installing (default)
  # auto-approved-only - install only skills with install_approved: true in .ai-skills.json
  # never              - never install; stop and report missing skills
  install_mode: ask

  required:
    - project-workflow

  conditional_required:
    - name: wp-guard
      condition: wordpress_detected

wordpress:
  # When true and a WordPress project is detected, wp-guard is required.
  # minimal/standard: warn and ask before continuing without it
  # strict/enterprise: stop until installed or explicitly bypassed
  guard_required: true
